name: Go CI

on:
  push:
    branches: [ "main" ]

jobs:
  run-go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v4 is fine — the env var below forces Node 24

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go.sum  # 👈 fixes the tar/cache restore error